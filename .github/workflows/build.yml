name: Compile Custom Kernel

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu make bc libssl-dev \
            libelf-dev bison flex python3 zip unzip \
            wget curl lld llvm libncurses5 libncurses-dev dos2unix

      - name: Clean Samsung Source Code (The Nuclear Option)
        run: |
          echo "Fixing invisible Windows carriage returns..."
          find . -type f \( -name "Kconfig*" -o -name "*.sh" -o -name "Makefile*" \) -exec dos2unix {} +
          
          echo "Obliterating Samsung's broken GPU config..."
          echo 'menu "ARM GPU Configuration"' > drivers/gpu/arm/Kconfig
          echo 'source "drivers/gpu/arm/bv_r38p1/Kconfig"' >> drivers/gpu/arm/Kconfig
          echo 'endmenu' >> drivers/gpu/arm/Kconfig

      - name: Patch Defconfig & Fix Broken Paths
        run: |
          echo "Injecting Droidspaces support into the defconfig..."
          CONFIG_FILE="arch/arm64/configs/exynos850-a13xx_defconfig"
          echo "CONFIG_IPC_NS=y" >> $CONFIG_FILE
          echo "CONFIG_BRIDGE=y" >> $CONFIG_FILE
          echo "CONFIG_STP=y" >> $CONFIG_FILE
          echo "CONFIG_USER_NS=y" >> $CONFIG_FILE
          echo "CONFIG_NAMESPACES=y" >> $CONFIG_FILE
          
          echo "Fixing Samsung's missing Himax directory..."
          mkdir -p drivers/input/touchscreen/himax/himax_83xxx_i2c
          touch drivers/input/touchscreen/himax/himax_83xxx_i2c/Makefile
          
          echo "Injecting root include paths into Samsung's broken Makefiles..."
          # This forces the compiler to search the root directory for missing headers
          echo 'ccflags-y += -I$(srctree)' >> security/samsung/five/Makefile
          echo 'ccflags-y += -I$(srctree)' >> security/samsung/defex_lsm/Makefile
          
          # Hard-patching dm.h just to be absolutely nuclear
          sed -i 's|drivers/md/dm.h|../../../drivers/md/dm.h|g' security/samsung/five/five_dmverity.c

      - name: Build Kernel
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          echo "Applying exynos850-a13xx_defconfig..."
          make O=out LLVM=1 CC=clang KCFLAGS="-Wno-deprecated-declarations" exynos850-a13xx_defconfig
          
          echo "Starting compilation on all CPU cores..."
          make -j$(nproc --all) O=out LLVM=1 CC=clang KCFLAGS="-Wno-deprecated-declarations"
          

      - name: Build Kernel
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          echo "Fixing broken include paths GLOBALLY in Samsung security drivers..."
          find security/samsung/ -type f -name "*.[ch]" -exec sed -i 's|"drivers/block/loop.h"|<linux/loop.h>|g' {} +
          find security/samsung/ -type f -name "*.[ch]" -exec sed -i 's|<drivers/block/loop.h>|<linux/loop.h>|g' {} +
          find security/samsung/ -type f -name "*.[ch]" -exec sed -i 's|"security/integrity/integrity.h"|"../../integrity/integrity.h"|g' {} +
          
          echo "Applying exynos850-a13xx_defconfig..."
          make O=out LLVM=1 CC=clang KCFLAGS="-Wno-deprecated-declarations" exynos850-a13xx_defconfig
          
          echo "Starting compilation on all CPU cores..."
          make -j$(nproc --all) O=out LLVM=1 CC=clang KCFLAGS="-Wno-deprecated-declarations"
          
          
      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Compiled-Kernel-Image
          path: |
            out/arch/arm64/boot/Image
            out/arch/arm64/boot/Image.gz
            out/arch/arm64/boot/dts/exynos/*.dtb
          compression-level: 9
          
